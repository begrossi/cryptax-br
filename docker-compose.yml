services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/cryptax.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY:-}
    restart: unless-stopped
    networks:
      - proxy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cryptax.rule=Host(`cryptax.srv1690369.hstgr.cloud`)"
      - "traefik.http.routers.cryptax.entrypoints=websecure"
      - "traefik.http.routers.cryptax.tls.certresolver=letsencrypt"
      - "traefik.http.services.cryptax.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true
