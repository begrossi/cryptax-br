services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    # Bind to loopback only — the frontend reaches the backend over the internal
    # `proxy` network (http://backend:8000), so the host port is for debugging.
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - DATABASE_URL=sqlite+aiosqlite:////app/data/cryptax.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - COINGECKO_API_KEY=${COINGECKO_API_KEY:-}
      - ETHERSCAN_API_KEY=${ETHERSCAN_API_KEY:-}
      - API_TOKEN=${API_TOKEN:-}
    restart: unless-stopped
    networks:
      - proxy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:8000
      - APP_SECRET=${APP_SECRET:-}
      - APP_PASSWORD=${APP_PASSWORD:-}
      - API_TOKEN=${API_TOKEN:-}
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.cryptax.rule=Host(`cryptax-br.srv1690369.hstgr.cloud`)"
      - "traefik.http.routers.cryptax.entrypoints=websecure"
      - "traefik.http.routers.cryptax.tls.certresolver=letsencrypt"
      - "traefik.http.services.cryptax.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true
